spring.application.name=crm

# ========================
# DATABASE (ENV FIRST, LOCAL FALLBACK)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# \u2705 ADD THIS (important for MySQL 8+)
spring.datasource.hikari.maximum-pool-size=10

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ========================
# SERVER
# ========================
server.port=${PORT:8080}

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ========================
# EMAIL (ENV + LOCAL FALLBACK)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:anjanaajith690@gmail.com}
spring.mail.password=${MAIL_PASSWORD:vsuh pddr zjsl mzkb}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# \u2705 ADD THESE (important for Render stability)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# LOGGING (DEBUG HELP)
# ========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE