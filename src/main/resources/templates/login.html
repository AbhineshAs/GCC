<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Business Login | GCC Smart</title>
    <style>
        :root {
            --deep-blue: #0f172a;
            --emerald: #10b981;
            --gold: #d4af37;
            --glass-white: rgba(255, 255, 255, 0.95);
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--glass-white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
            border-top: 4px solid var(--gold);
        }
        .login-card h2 {
            color: var(--deep-blue);
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: var(--deep-blue); font-weight: 600; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--emerald);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--deep-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover {
            background: #1e293b;
            transform: translateY(-1px);
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>GCC SMART</h2>
        <p class="subtitle">Automation Platform Login</p>
        
        <form th:action="@{/login}" method="post">
            <div th:if="${error}" class="error-msg" th:text="${error}"></div>
            
            <div class="form-group">
                <label>Corporate Email</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
