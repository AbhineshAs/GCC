<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Closed Sales Registry | GCC Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --bg-main: #f3f4f9; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #1e293b; --text-secondary: #64748b;
            --indigo-accent: #6366f1; --brd: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            --danger: #f43f5e; --success: #10b981; --warning: #f59e0b;
            --sidebar-width: 280px; --sidebar-collapsed-width: 85px;
        }

        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

 /* SIDEBAR STRUCTURE */
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); height: 100vh; padding: 2.5rem 1.2rem; position: fixed; border-right: 1px solid var(--brd); z-index: 100; display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 24px rgba(0,0,0,0.02); box-sizing: border-box; }
        body.collapsed .sidebar { width: var(--sidebar-collapsed-width); padding: 2.5rem 0.8rem; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; padding: 0 10px; }
        .logo-text { color: var(--indigo-accent); font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; transition: opacity 0.3s; white-space: nowrap; }
        body.collapsed .logo-text { opacity: 0; pointer-events: none; }
        #toggleBtn { background: #f1f5ff; border: none; color: var(--indigo-accent); padding: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        .nav-group { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .nav-item { padding: 14px 18px; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 15px; border-radius: 14px; font-weight: 600; font-size: 0.9rem; white-space: nowrap; transition: 0.2s; }
        .nav-item.active { background: #f1f5ff; color: var(--indigo-accent); }
        .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
        body.collapsed .nav-text { display: none; }

        /* RESTORED LOGOUT BOX */
        .logout-box { padding-top: 20px; border-top: 1px solid var(--brd); margin-top: auto; padding-bottom: 10px; }
        .logout-link { color: var(--danger); font-weight: 700; display: flex; align-items: center; gap: 15px; text-decoration: none; padding: 12px 16px; border-radius: 12px; transition: 0.2s; font-size: 0.9rem; }
        .logout-link:hover { background: #fff1f2; }
        
                /* CONTENT AREA */
        .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 4rem; box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body.collapsed .main-wrapper { margin-left: var(--sidebar-collapsed-width); width: calc(100% - var(--sidebar-collapsed-width)); }

        .page-header { margin-bottom: 2rem; display: flex; flex-direction: column; gap: 5px; }
        .page-header h1 { font-weight: 900; margin: 0; font-size: 2.8rem; letter-spacing: -2.5px; color: var(--text-primary); }
        
        .revenue-card { background: white; padding: 20px 25px; border-radius: 24px; border: 1px solid var(--brd); border-left: 5px solid var(--success); box-shadow: var(--shadow); margin-bottom: 2rem; width: fit-content; min-width: 320px; }
        .revenue-card span { font-size: 0.7rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .revenue-card b { font-size: 2.2rem; display: block; letter-spacing: -1px; margin-top: 5px; color: var(--text-primary); }

        /* FIXED CONTROLS HUB - NO OVERLAP */
        .controls-hub { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .search-container { position: relative; flex: 1; min-width: 300px; max-width: 450px; }
        .search-input { width: 100%; padding: 14px 15px 14px 45px; background: white; border: 1.5px solid var(--brd); border-radius: 15px; font-family: inherit; font-weight: 600; font-size: 0.85rem; transition: 0.3s; box-shadow: var(--shadow); }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
        .action-btns { display: flex; gap: 12px; }

        .btn-export { background: white; color: var(--text-primary); border: 1.5px solid var(--brd); padding: 12px 20px; border-radius: 15px; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; box-shadow: var(--shadow); }
        .btn-export:hover { border-color: var(--indigo-accent); color: var(--indigo-accent); transform: translateY(-2px); }

        /* REGISTRY CARD */
        .registry-card { background: var(--card-bg); padding: 1rem; border-radius: 35px; border: 1px solid var(--brd); box-shadow: var(--shadow); }
        .lead-table { width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        .lead-table th { padding: 0 20px 5px; font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; text-align: left; }
        .lead-table td { padding: 25px 20px; background: #ffffff; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); vertical-align: middle; transition: 0.2s; }
        .lead-table td:first-child { border-left: 1px solid var(--brd); border-radius: 20px 0 0 20px; }
        .lead-table td:last-child { border-right: 1px solid var(--brd); border-radius: 0 20px 20px 0; }
        .row-hidden { display: none !important; }

        .identity-box { display: flex; align-items: center; gap: 15px; }
        .deal-avatar { width: 45px; height: 45px; background: #f0fdf4; color: var(--success); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        
        /* CLOSURE SUMMARY BEAUTIFIED */
        .summary-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .summary-cell { display: flex; flex-direction: column; gap: 3px; }
        .summary-cell label { font-size: 0.55rem; text-transform: uppercase; font-weight: 900; color: var(--text-secondary); letter-spacing: 0.8px; margin: 0; }
        .summary-cell span { font-size: 0.85rem; font-weight: 700; color: var(--text-primary); }
        .summary-cell.val-highlight span { color: var(--indigo-accent); font-weight: 800; }
        .remarks-row { grid-column: span 3; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--brd); }
        .remarks-row p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); font-style: italic; line-height: 1.4; }

        .deal-badge { background: #f0fdf4; color: var(--success); padding: 8px 14px; border-radius: 12px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; border: 1.5px solid #d1fae5; display: inline-flex; align-items: center; gap: 5px; }
        
        .btn-report-single { background: #6366f1; color: white; border: none; padding: 12px 18px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2); }
        .btn-report-single:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3); }

        @media print { .sidebar, .controls-hub, .btn-report-single { display: none !important; } .main-wrapper { margin: 0; padding: 0; width: 100%; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">GCC SMART</span>
            <button id="toggleBtn" onclick="toggleSidebar()">
                <svg id="toggleIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"></path></svg>
            </button>
        </div>
        <div class="nav-group">
            <a th:href="@{/executive/dashboard}" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span class="nav-text">Overview</span></a>
            <a th:href="@{/executive/tasks}" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg><span class="nav-text">My Duties</span></a>
            <a th:href="@{/executive/lead-capture}" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6M23 11h-6"/></svg><span class="nav-text">Lead Capture</span></a>
            <a th:href="@{/executive/follow-ups}" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="nav-text">Pipeline</span></a>
            <a th:href="@{/leave/apply}" class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
    </svg>
    <span class="nav-text">Apply Leave</span>
</a>
            <a th:href="@{/executive/closed-sales}" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="nav-text">Closed Sales</span></a>
             <a th:href="@{/executive/profile}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 kitchen.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-text">Settings</span>
            </a>
        </div>
        <div class="logout-box">
            <a th:href="@{/logout}" class="logout-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="nav-text">Logout System</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="page-header">
            <h1>Closed Sales Registry</h1>
        </header>

        <div class="revenue-card">
            <span>Portfolio Net Revenue</span>
            <b id="totalValueLabel">₹ 0.00</b>
        </div>

        <div class="controls-hub">
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                <input type="text" id="dealSearch" class="search-input" placeholder="Quick search transactions..." onkeyup="filterRegistry()">
            </div>
            <div class="action-btns">
                <button onclick="exportToExcel()" class="btn-export">Excel Export</button>
                <button onclick="window.print()" class="btn-export">Print All</button>
            </div>
        </div>

        <div class="registry-card">
            <table class="lead-table" id="registryTable">
                <thead>
                    <tr>
                        <th width="20%">Acquisition</th>
                        <th width="45%">Closure Summary</th>
                        <th width="15%">Status</th>
                        <th width="20%" style="text-align:right;">Report</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${leads}" class="registry-row">
                        <td>
                            <div class="identity-box">
                                <div class="deal-avatar">₹</div>
                                <div>
                                    <b style="display:block; font-size:1.05rem; letter-spacing:-0.3px;" th:text="${l.customerName}"></b>
                                    <span style="font-size:0.65rem; color:var(--indigo-accent); font-weight:800; text-transform:uppercase;">Verified Entry</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="summary-wrapper">
                                <div class="summary-cell val-highlight">
                                    <label>Amount</label>
                                    <span class="row-amount" th:text="${#strings.contains(l.notes, '₹') ? #strings.substringBefore(#strings.substringAfter(l.notes, '₹'), ' |') : 'N/A'}"></span>
                                </div>
                                <div class="summary-cell">
                                    <label>Date</label>
                                    <span th:text="${#strings.contains(l.notes, 'Date: ') ? #strings.substringBefore(#strings.substringAfter(l.notes, 'Date: '), ' |') : 'N/A'}"></span>
                                </div>
                                <div class="summary-cell">
                                    <label>Time</label>
                                    <span th:text="${#strings.contains(l.notes, 'Time: ') ? #strings.substringBefore(#strings.substringAfter(l.notes, 'Time: '), ' |') : 'N/A'}"></span>
                                </div>
                                <div class="remarks-row">
                                    <label>Executive Remarks</label>
                                    <p th:text="${#strings.contains(l.notes, 'Remarks: ') ? #strings.substringAfter(l.notes, 'Remarks: ') : 'No additional notes provided.'}"></p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="deal-badge">
                                <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                Finalized
                            </div>
                        </td>
                        <td style="text-align:right;">
                            <button class="btn-report-single" 
                                    th:data-cname="${l.customerName}" 
                                    th:data-cnote="${l.notes}" 
                                    onclick="generatePDF(this)">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Report
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function toggleSidebar() {
            document.body.classList.toggle('collapsed');
            const icon = document.getElementById('toggleIcon');
            if(icon) {
                icon.innerHTML = document.body.classList.contains('collapsed') 
                    ? '<path d="M13 17l5-5-5-5M6 17l5-5-5-5"></path>' 
                    : '<path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"></path>';
            }
        }

        function calculateRevenue() {
            var total = 0;
            document.querySelectorAll('.registry-row').forEach(function(row) {
                var amountText = row.querySelector('.row-amount').innerText.replace(/[^0-9.]/g, '');
                var val = parseFloat(amountText);
                if (!isNaN(val)) total += val;
            });
            document.getElementById('totalValueLabel').innerText = '₹ ' + total.toLocaleString('en-IN', {minimumFractionDigits: 2});
        }

        function filterRegistry() {
            var input = document.getElementById('dealSearch').value.toLowerCase();
            document.querySelectorAll('.registry-row').forEach(function(row) {
                row.classList.toggle('row-hidden', !row.innerText.toLowerCase().includes(input));
            });
            calculateRevenue();
        }

        function exportToExcel() {
            var table = document.getElementById("registryTable");
            var wb = XLSX.utils.table_to_book(table, { sheet: "Sales" });
            XLSX.writeFile(wb, "GCC_Closed_Sales_Report.xlsx");
        }

        function generatePDF(btn) {
            var jsPDFInstance = window.jspdf.jsPDF;
            var doc = new jsPDFInstance();
            var name = btn.getAttribute('data-cname');
            var notes = btn.getAttribute('data-cnote');
            
            doc.setFontSize(22); doc.setTextColor(99, 102, 241);
            doc.text("GCC SMART - SALE REPORT", 14, 22);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text("Generated on: " + new Date().toLocaleString(), 14, 30);
            
            var head = new Array(); head.push(["Metric", "Details"]);
            var body = new Array();
            body.push(["Customer", name]);
            body.push(["Closure Summary", notes]);
            body.push(["Status", "Verified & Finalized"]);

            doc.autoTable({
                startY: 40,
                head: head,
                body: body,
                theme: 'striped',
                headStyles: { fillColor: [99, 102, 241] }
            });

            doc.save("Report_" + name.replace(/\s+/g, '_') + ".pdf");
        }

        window.onload = calculateRevenue;
        /*]]>*/
    </script>
</body>
</html>
