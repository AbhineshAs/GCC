<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Apply Leave | GCC Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f3f4f9; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #2d3748; --text-secondary: #718096;
            --indigo-accent: #6366f1; --brd: #edf2f7; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            --success: #10b981; --danger: #f43f5e; --warning: #f59e0b;
            --sidebar-width: 280px; --sidebar-collapsed-width: 85px;
        }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR STRUCTURE */
        .sidebar { 
            width: var(--sidebar-width); background: var(--sidebar-bg); height: 100vh; 
            padding: 2.5rem 1.2rem; position: fixed; border-right: 1px solid var(--brd); 
            z-index: 100; display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0,0,0,0.02); box-sizing: border-box;
        }
        body.collapsed .sidebar { width: var(--sidebar-collapsed-width); padding: 2.5rem 0.8rem; }
        
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; padding: 0 10px; }
        .logo-text { color: var(--indigo-accent); font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; transition: opacity 0.3s; white-space: nowrap; }
        body.collapsed .logo-text { opacity: 0; pointer-events: none; width: 0; }
        
        #toggleBtn { background: #f1f5ff; border: none; color: var(--indigo-accent); padding: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        #toggleBtn:hover { background: var(--indigo-accent); color: white; }

        .nav-group { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; }
        .nav-item { padding: 14px 18px; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 15px; border-radius: 14px; font-weight: 600; font-size: 0.95rem; white-space: nowrap; transition: 0.3s; }
        .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
        
        body.collapsed .nav-text { display: none; }
        .nav-item:hover { background: #f8fafc; color: var(--indigo-accent); }
        .nav-item.active { background: #f1f5ff; color: var(--indigo-accent); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08); }

        .logout-box { padding-top: 20px; border-top: 1px solid var(--brd); margin-top: auto; padding-bottom: 10px; }
        .logout-btn { color: var(--danger) !important; font-weight: 700; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 15px; padding: 14px 18px; border-radius: 14px; }
        .logout-btn:hover { background: #fff1f2 !important; }

        /* MAIN AREA */
        .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 3rem 4rem; box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body.collapsed .main-wrapper { margin-left: var(--sidebar-collapsed-width); width: calc(100% - var(--sidebar-collapsed-width)); }
        
        /* FORM & TABLE CARDS */
        .action-card { background: white; padding: 2.2rem; border-radius: 28px; border: 1px solid var(--brd); box-shadow: var(--shadow); margin-bottom: 30px; }
        .form-grid { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.7rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; }
        .form-control { padding: 12px 16px; border-radius: 14px; border: 1.5px solid var(--brd); background: #f8fafc; font-family: inherit; font-weight: 600; font-size: 0.9rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        .form-control:focus { border-color: var(--indigo-accent); background: white; }

        .attendance-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .attendance-table th { text-align: left; padding: 0 15px; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; }
        .attendance-table td { padding: 18px 15px; background: #ffffff; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); font-size: 0.95rem; vertical-align: middle; }
        .attendance-table td:first-child { border-left: 1px solid var(--brd); border-radius: 14px 0 0 14px; font-weight: 700; }
        .attendance-table td:last-child { border-right: 1px solid var(--brd); border-radius: 0 14px 14px 0; }


/* Table Action & Styling Enhancements */
.btn-cancel { color: var(--danger); font-weight: 700; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
.btn-cancel:hover { text-decoration: underline; opacity: 0.8; }
.text-finalized { color: #cbd5e1; font-weight: 600; font-size: 0.8rem; }

.status-pill.PENDING { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }
.status-pill.APPROVED { background: #ecfdf5; color: #065f46; border: 1px solid #d1fae5; }
.status-pill.REJECTED { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }

.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.search-box { padding: 10px 15px 10px 40px; border-radius: 12px; border: 1px solid var(--brd); background: #f8fafc url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 15px center; font-family: inherit; font-size: 0.85rem; outline: none; width: 250px; }

        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #f1f5f9; color: #475569; }
        .pill-present { background: #ecfdf5; color: var(--success); }
        .type-badge { background: #f1f5ff; color: var(--indigo-accent); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">GCC SMART HR</span>
            <button id="toggleBtn" onclick="toggleSidebar()">
                <svg class="nav-icon" id="toggleIcon" viewBox="0 0 24 24"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5" fill="none" stroke="currentColor" stroke-width="2.5"></path></svg>
            </button>
        </div>
        
        <div class="nav-group">
            <a th:href="@{/hr/dashboard}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path></svg>
                <span class="nav-text">Staff Registry</span>
            </a>
            <a th:href="@{/hr/payroll}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path></svg>
                <span class="nav-text">Payroll Center</span>
            </a>
            <a th:href="@{/hr/add-executive}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                <span class="nav-text">Add Executive</span>
            </a>
            <a th:href="@{/hr/tasks}" class="nav-item">
            	<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    			<span class="nav-text">Manager Directives</span>
			</a>
            <a th:href="@{/hr/attendance/all}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="nav-text">Attendance</span>
            </a>
            <a th:href="@{/hr/leave/apply}" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="nav-text">Apply Leave</span>
            </a>
            
        </div>

        <div class="logout-box">
            <a th:href="@{/logout}" class="nav-item logout-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="nav-text">Logout System</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header style="margin-bottom: 35px;">
            <h1 style="font-weight: 900; letter-spacing: -2px; font-size: 2.8rem; margin:0; color: #1e293b;">Apply for Leave</h1>
            <p style="color: var(--text-secondary); font-weight: 600; font-size: 1.1rem; margin-top: 5px;">Submit requests to your Manager for review.</p>
        </header>

        <div class="action-card">
            <form th:action="@{/hr/leave/submit}" method="post" class="form-grid">
                <div class="form-group">
                    <label>Leave Type</label>
                    <select name="leaveType" class="form-control" required style="min-width: 180px;">
                        <option value="Annual Leave">Annual Leave</option>
                        <option value="Sick Leave">Sick Leave</option>
                        <option value="Emergency Leave">Emergency Leave</option>
                        <option value="Maternity/Paternity">Maternity/Paternity</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" name="startDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" name="endDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Reason for Absence</label>
                    <input type="text" name="reason" placeholder="e.g. Visiting home town" class="form-control" required style="min-width: 320px;">
                </div>
                <button type="submit" style="background: var(--indigo-accent); color: white; border: none; padding: 13px 30px; border-radius: 14px; font-weight: 800; cursor: pointer;">Submit Request</button>
            </form>
        </div>

        <div class="action-card">
    <div class="history-header">
        <h3 style="margin:0; font-weight: 800; letter-spacing: -0.5px;">Personal History</h3>
        <input type="text" id="historySearch" class="search-box" placeholder="Search history..." onkeyup="filterHistory()">
    </div>
    
    <table class="attendance-table" id="historyTable">
        <thead>
            <tr>
                <th>Duration</th>
                <th>Type</th>
                <th>Status</th>
                <th style="text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="l : ${myLeaves}">
                <td>
                    <div style="font-weight: 700; color: #1e293b;" th:text="${#temporals.format(l.startDate, 'M/dd/yy') + ' to ' + #temporals.format(l.endDate, 'M/dd/yy')}"></div>
                    <div style="font-size: 0.75rem; color: var(--indigo-accent); font-weight: 700; margin-top: 2px;" 
                         th:text="${l.getTotalDays() + ' Days'}">0 Days</div>
                </td>
                <td>
                    <span style="font-weight: 800; font-size: 0.75rem; color: #1e293b; text-transform: uppercase;" th:text="${l.leaveType}"></span>
                </td>
                <td>
                    <span th:text="${l.status}" th:class="'status-pill ' + ${l.status}"></span>
                </td>
                <td style="text-align: right;">
                    <a th:if="${l.status == 'PENDING'}" 
                       th:href="@{'/hr/leave/cancel/' + ${l.id}}" 
                       class="btn-cancel" 
                       onclick="return confirm('Are you sure you want to cancel this request?')">Cancel</a>
                    
                    <span th:unless="${l.status == 'PENDING'}" class="text-finalized">Finalized</span>
                </td>
            </tr>
            <tr th:if="${myLeaves == null or myLeaves.isEmpty()}">
                <td colspan="4" style="text-align:center; padding: 40px; color: var(--text-secondary);">No previous requests found.</td>
            </tr>
        </tbody>
    </table>
</div>
    </div>

    <script>
        function toggleSidebar() { 
            document.body.classList.toggle('collapsed');
            const icon = document.getElementById('toggleIcon');
            icon.innerHTML = document.body.classList.contains('collapsed') 
                ? '<path d="M13 17l5-5-5-5M6 17l5-5-5-5" fill="none" stroke="currentColor" stroke-width="2.5"></path>' 
                : '<path d="M11 17l-5-5 5-5M18 17l-5-5 5-5" fill="none" stroke="currentColor" stroke-width="2.5"></path>';
        }
        
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.get('success') === 'cancelled') {
            Swal.fire({
                title: 'Request Cancelled',
                text: 'Your leave request has been removed.',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false,
                borderRadius: '24px'
            });
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
