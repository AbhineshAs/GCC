<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Apply Leave | GCC Smart Executive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-main: #f3f4f9; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #1e293b; --text-secondary: #64748b;
            --indigo-accent: #6366f1; --brd: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            --success: #10b981; --warning: #f59e0b; --danger: #f43f5e;
            --sidebar-width: 280px;
        }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--bg-main); min-height: 100vh; }

        
        /* SIDEBAR STRUCTURE */
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); height: 100vh; padding: 2.5rem 1.2rem; position: fixed; border-right: 1px solid var(--brd); z-index: 100; display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 24px rgba(0,0,0,0.02); box-sizing: border-box; }
        body.collapsed .sidebar { width: var(--sidebar-collapsed-width); padding: 2.5rem 0.8rem; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; padding: 0 10px; }
        .logo-text { color: var(--indigo-accent); font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; transition: opacity 0.3s; white-space: nowrap; }
        body.collapsed .logo-text { opacity: 0; pointer-events: none; }
        #toggleBtn { background: #f1f5ff; border: none; color: var(--indigo-accent); padding: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        .nav-group { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
        .nav-item { padding: 14px 18px; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 15px; border-radius: 14px; font-weight: 600; font-size: 0.9rem; white-space: nowrap; transition: 0.2s; }
        .nav-item.active { background: #f1f5ff; color: var(--indigo-accent); }
        .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
        body.collapsed .nav-text { display: none; }

        /* RESTORED LOGOUT BOX */
        .logout-box { padding-top: 20px; border-top: 1px solid var(--brd); margin-top: auto; padding-bottom: 10px; }
        .logout-link { color: var(--danger); font-weight: 700; display: flex; align-items: center; gap: 15px; text-decoration: none; padding: 12px 16px; border-radius: 12px; transition: 0.2s; font-size: 0.9rem; }
        .logout-link:hover { background: #fff1f2; }
        .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 4rem; box-sizing: border-box; }
        
        /* LAYOUT ARRANGE: Column structure to put table below form */
        .content-stack { display: flex; flex-direction: column; gap: 30px; }
        .card { background: white; padding: 30px; border-radius: 28px; border: 1px solid var(--brd); box-shadow: var(--shadow); }
        
        /* FORM STYLING */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--brd); background: #f8fafc; font-family: inherit; box-sizing: border-box; }
        .btn-submit { background: var(--indigo-accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 200px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.3); }

        /* TABLE STYLING */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-box { position: relative; width: 300px; }
        .search-box input { margin-top: 0; padding: 10px 15px 10px 40px; border-radius: 14px; background: #f1f5f9; border: 1px solid var(--brd); font-size: 0.85rem; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }

        .status-badge { padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .PENDING { background: #fffbeb; color: var(--warning); }
        .APPROVED { background: #f0fdf4; color: var(--success); }
        .REJECTED { background: #fff1f2; color: var(--danger); }

        .btn-cancel { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.75rem; font-weight: 700; text-decoration: underline; padding: 0; transition: 0.2s; }
        .btn-cancel:hover { color: #be123c; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">GCC SMART</span>
            <button id="toggleBtn" onclick="toggleSidebar()">
                <svg id="toggleIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"></path></svg>
            </button>
        </div>
        <div class="nav-group">
            <a th:href="@{/executive/dashboard}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="nav-text">Overview</span>
            </a>
            <a th:href="@{/executive/tasks}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                <span class="nav-text">My Duties</span>
            </a>
            <a th:href="@{/executive/lead-capture}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6M23 11h-6"/></svg>
                <span class="nav-text">Lead Capture</span>
            </a>
            <a th:href="@{/executive/follow-ups}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="nav-text">Pipeline</span>
            </a>
            <a th:href="@{/leave/apply}" class="nav-item active">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
    </svg>
    <span class="nav-text">Apply Leave</span>
</a>
            <a th:href="@{/executive/closed-sales}" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="nav-text">Closed Sales</span></a>
            <a th:href="@{/executive/profile}" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 kitchen.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-text">Settings</span>
            </a>
        </div>
        
        <div class="logout-box">
            <a th:href="@{/logout}" class="logout-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="nav-text">Logout System</span>
            </a>
        </div>
    </aside>
    <div class="main-wrapper">
        <header style="margin-bottom: 2.5rem;">
            <h1 style="font-weight: 900; letter-spacing: -2px; font-size: 2.2rem; margin:0;">Leave Application</h1>
            <p style="color: var(--text-secondary); margin-top:5px;">Your requests will be sent to your <b>Manager</b> for approval.</p>
        </header>

        <div class="content-stack">
            <div class="card">
                <h3 style="margin-top:0; font-weight: 800;">New Request</h3>
                <form th:action="@{/leave/submit}" method="post">
                    <div class="form-grid">
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 800; color: var(--text-secondary);">LEAVE TYPE</label>
                            <select name="leaveType" required>
                                <option value="ANNUAL">Annual Leave</option>
                                <option value="SICK">Sick Leave</option>
                                <option value="EMERGENCY">Emergency</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 800; color: var(--text-secondary);">START DATE</label>
                            <input type="date" name="startDate" required>
                        </div>
                        <div>
                            <label style="font-size: 0.75rem; font-weight: 800; color: var(--text-secondary);">END DATE</label>
                            <input type="date" name="endDate" required>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <label style="font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); display:block;">REASON</label>
                        <textarea name="reason" placeholder="Briefly explain your absence..." rows="3"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">Submit Request</button>
                </form>
            </div>

            <div class="card">
                <div class="history-header">
                    <h3 style="margin:0; font-weight: 800;">Personal History</h3>
                    <div class="search-box">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                        <input type="text" id="historySearch" placeholder="Search history..." onkeyup="filterHistory()">
                    </div>
                </div>
                
                <table style="width:100%; border-collapse: collapse;" id="historyTable">
                    <thead>
                        <tr style="text-align:left; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">
                            <th style="padding-bottom: 15px;">Duration</th>
                            <th style="padding-bottom: 15px;">Type</th>
                            <th style="padding-bottom: 15px;">Status</th>
                            <th style="padding-bottom: 15px; text-align:right;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="leave : ${myHistory}" style="border-top: 1px solid var(--brd);">
                            <td style="padding: 15px 0;">
                                <div th:text="${leave.startDate + ' to ' + leave.endDate}" style="font-weight: 700;"></div>
                                <small th:text="${leave.getTotalDays() + ' Days'}" style="color: var(--indigo-accent); font-weight: 700;"></small>
                            </td>
                            <td th:text="${leave.leaveType}" style="font-size: 0.85rem; font-weight: 600;"></td>
                            <td><span th:class="'status-badge ' + ${leave.status}" th:text="${leave.status}"></span></td>
                            <td style="text-align:right;">
                                <form th:if="${leave.status == 'PENDING'}" th:action="@{/leave/cancel}" method="post">
                                    <input type="hidden" name="id" th:value="${leave.id}">
                                    <button type="submit" class="btn-cancel" onclick="confirmCancel(event, this.form)">Cancel</button>
                                </form>
                                <span th:if="${leave.status != 'PENDING'}" style="color: #cbd5e1; font-size: 0.7rem;">Finalized</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    // Search Filtering Function
    function filterHistory() {
        const input = document.getElementById("historySearch");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("historyTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].innerText.toLowerCase();
            tr[i].style.display = rowText.includes(filter) ? "" : "none";
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('error') === 'overlap') {
            Swal.fire({
                title: 'Schedule Conflict!',
                text: 'You already have a pending or approved leave during these dates.',
                icon: 'error',
                confirmButtonColor: '#6366f1',
                borderRadius: '24px'
            });
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });

    function confirmCancel(event, form) {
        event.preventDefault();
        Swal.fire({
            title: 'Are you sure?',
            text: "Withdraw this leave request?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#f43f5e',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, cancel it!',
            borderRadius: '24px'
        }).then((result) => {
            if (result.isConfirmed) form.submit();
        });
    }
</script>
</body>
</html>
