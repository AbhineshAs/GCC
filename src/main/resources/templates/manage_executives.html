<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Team | GCC Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #f3f4f9; --sidebar-bg: #ffffff; --card-bg: #ffffff; --text-primary: #2d3748; --indigo-accent: #6366f1; --brd: #edf2f7; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); --sidebar-width: 280px; --sidebar-collapsed-width: 85px; }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--bg-main); overflow-x: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); height: 100vh; padding: 2.5rem 1.2rem; position: fixed; border-right: 1px solid var(--brd); transition: 0.4s; }
        body.collapsed .sidebar { width: var(--sidebar-collapsed-width); }
        .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 3.5rem; transition: 0.4s; }
        body.collapsed .main-wrapper { margin-left: var(--sidebar-collapsed-width); }
        .nav-item { padding: 14px 18px; color: #718096; text-decoration: none; display: flex; align-items: center; gap: 15px; border-radius: 14px; font-weight: 600; }
        .nav-item.active { background: #f1f5ff; color: var(--indigo-accent); }
        .action-card { background: #fff; padding: 2.2rem; border-radius: 28px; border: 1px solid var(--brd); box-shadow: var(--shadow); margin-bottom: 30px; }
        .lead-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .lead-table td { padding: 18px 15px; background: #fff; border-top: 1px solid var(--brd); border-bottom: 1px solid var(--brd); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><span class="logo-text" th:text="${isAdmin ? 'GCC SMART ADMIN' : 'GCC SMART'}" style="color:var(--indigo-accent); font-weight:800;"></span><button onclick="toggleSidebar()" style="background:none; border:none; cursor:pointer;">📂</button></div>
        <div class="nav-group" style="margin-top:3rem;">
            <a th:href="${isAdmin ? '/admin/dashboard' : '/manager/dashboard'}" class="nav-item">🏠 Overview</a>
            <a th:href="${isAdmin ? '/admin/manage-executives' : '/manager/executives'}" class="nav-item active">👥 Manage Team</a>
        </div>
        <div class="logout-box" style="margin-top:auto; padding-top:20px; border-top:1px solid var(--brd);">
            <a th:href="@{/logout}" class="nav-item" style="color: #f43f5e;">🚪 Logout</a>
        </div>
    </aside>
    <div class="main-wrapper">
        <header><h1 th:text="${isAdmin ? 'Executive Administration' : 'My Team Roster'}" style="font-weight:800;"></h1></header>
        <div class="action-card">
            <table class="lead-table">
                <thead><tr><th>Executive</th><th>Email</th><th th:if="${isAdmin}">Assign</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="e : ${executives}">
                        <td th:text="${e.name}" style="font-weight:700;"></td>
                        <td th:text="${e.email}"></td>
                        <td th:if="${isAdmin}"></td>
                        <td><button style="background:none; border:none;">✏️</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>function toggleSidebar() { document.body.classList.toggle('collapsed'); }</script>
</body>
</html>
